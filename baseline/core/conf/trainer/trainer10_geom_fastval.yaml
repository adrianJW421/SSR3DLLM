# @package _group_
deterministic: false
max_epochs: 10
min_epochs: 1
resume_from_checkpoint: null

# Run validation every epoch so logs show eval trends.
check_val_every_n_epoch: 1

# Keep startup fast.
num_sanity_val_steps: 1

# Lightweight eval: only run a few val/test batches.
limit_val_batches: 20
limit_test_batches: 20
